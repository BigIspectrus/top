<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="InstruMed">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>InstruMed – Instrumentação Cirúrgica</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2330;--border:#30363d;
  --accent:#2dd4bf;--accent2:#38bdf8;--danger:#f87171;--success:#4ade80;
  --warn:#fbbf24;--text:#e6edf3;--muted:#8b949e;--card:#1c2330;--radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;
  overscroll-behavior:none}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:200;background:rgba(13,17,23,.97);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);padding:11px 14px;
  display:flex;align-items:center;justify-content:space-between;gap:8px}
.topbar h1{font-family:'DM Serif Display',serif;font-size:1.2rem;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  white-space:nowrap}
.topbar-right{display:flex;align-items:center;gap:5px}
.pill{background:var(--surface2);border:1px solid var(--border);border-radius:100px;
  padding:4px 10px;font-size:.73rem;font-weight:600;color:var(--muted);
  white-space:nowrap;cursor:pointer;font-family:inherit;transition:all .2s}
.pill span{color:var(--accent)}
.pill:hover,.pill.active{border-color:var(--accent);color:var(--accent)}
.pill.active-solid{background:var(--accent);border-color:var(--accent);color:#0d1117}

/* ── SRS BADGE ── */
.srs-badge{display:none;position:fixed;bottom:16px;right:16px;z-index:300;
  background:var(--surface2);border:1px solid var(--border);border-radius:100px;
  padding:7px 14px;font-size:.75rem;font-weight:600;color:var(--muted);
  box-shadow:0 4px 20px rgba(0,0,0,.4);animation:slideUp .3s ease}
.srs-badge.show{display:flex;align-items:center;gap:6px}
.srs-dot{width:7px;height:7px;border-radius:50%}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:6px;padding:10px 14px 0;overflow-x:auto;
  scrollbar-width:none;border-bottom:1px solid var(--border);padding-bottom:10px}
.filter-bar::-webkit-scrollbar{display:none}
.fb{flex-shrink:0;background:var(--surface);border:1px solid var(--border);
  color:var(--muted);border-radius:100px;padding:6px 13px;font-size:.73rem;
  font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit}
.fb.active{background:var(--accent);border-color:var(--accent);color:#0d1117;font-weight:600}
.fb.rev.active{background:#f87171;border-color:#f87171;color:#fff}
.fb.diag.active{background:var(--warn);border-color:var(--warn);color:#0d1117}
.fb.browse.active{background:var(--accent2);border-color:var(--accent2);color:#0d1117}
.fb.nouse.active{background:#a78bfa;border-color:#a78bfa;color:#0d1117}

/* ── DIFF BAR ── */
.diff-bar{display:flex;gap:5px;padding:7px 14px;overflow-x:auto;scrollbar-width:none}
.diff-bar::-webkit-scrollbar{display:none}
.db{flex-shrink:0;background:var(--surface);border:1px solid var(--border);
  color:var(--muted);border-radius:100px;padding:5px 11px;font-size:.71rem;
  font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.db.all.active{background:var(--accent);border-color:var(--accent);color:#0d1117}
.db[data-d="1"].active{background:#4ade80;border-color:#4ade80;color:#0d1117}
.db[data-d="2"].active{background:#fbbf24;border-color:#fbbf24;color:#0d1117}
.db[data-d="3"].active{background:#f87171;border-color:#f87171;color:#0d1117}

/* ── MAIN ── */
main{padding:0 13px 110px;max-width:620px;margin:0 auto}
.prog-wrap{height:3px;background:var(--surface2);border-radius:10px;margin:12px 0 13px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:10px;transition:width .4s ease}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;margin-bottom:11px;animation:slideUp .28s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card-header{padding:10px 14px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--border);gap:8px}
.card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.card-tag{font-size:.63rem;font-weight:600;letter-spacing:.06em;
  text-transform:uppercase;color:var(--muted)}
.diff-badge{font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:100px}
.diff-badge.d1{background:rgba(74,222,128,.15);color:#4ade80;border:1px solid rgba(74,222,128,.3)}
.diff-badge.d2{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3)}
.diff-badge.d3{background:rgba(248,113,113,.15);color:#f87171;border:1px solid rgba(248,113,113,.3)}
.srs-level{font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:100px}
.srs-level.new{background:rgba(56,189,248,.15);color:var(--accent2);border:1px solid rgba(56,189,248,.3)}
.srs-level.learning{background:rgba(251,191,36,.15);color:var(--warn);border:1px solid rgba(251,191,36,.3)}
.srs-level.mastered{background:rgba(74,222,128,.15);color:var(--success);border:1px solid rgba(74,222,128,.3)}
.card-num{font-size:.72rem;color:var(--muted);flex-shrink:0}
.mode-badge{font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:100px}
.mode-badge.rev{background:rgba(248,113,113,.2);color:#f87171;border:1px solid rgba(248,113,113,.3)}
.mode-badge.diag{background:rgba(251,191,36,.2);color:var(--warn);border:1px solid rgba(251,191,36,.3)}
.mode-badge.nouse{background:rgba(167,139,250,.2);color:#a78bfa;border:1px solid rgba(167,139,250,.3)}

/* ── IMAGE ── */
.img-wrap{background:#080d12;min-height:195px;display:flex;align-items:center;
  justify-content:center;position:relative;overflow:hidden;cursor:pointer}
.img-wrap img{max-height:195px;max-width:100%;object-fit:contain;
  transition:opacity .3s ease;opacity:0}
.img-skel{position:absolute;inset:0;
  background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.img-badge{position:absolute;bottom:6px;right:8px;font-size:.57rem;color:var(--muted);
  background:rgba(0,0,0,.65);padding:2px 7px;border-radius:100px;opacity:0;transition:opacity .3s}
.photo-dots{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
  display:none;gap:5px}
.photo-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.2);transition:background .2s}
.photo-dot.active{background:var(--accent)}
.tap-hint{position:absolute;top:6px;right:8px;font-size:.57rem;color:var(--muted);
  background:rgba(0,0,0,.5);padding:2px 7px;border-radius:100px}

/* ── BROWSE MODE image ── */
.img-wrap.browse-mode{min-height:220px;cursor:default}
.img-wrap.browse-mode img{max-height:220px}

/* ── QUESTION ── */
.q-text{padding:13px 14px 9px;font-size:.97rem;font-weight:500;line-height:1.5}
.q-ctx{margin:0 14px 10px;background:var(--surface2);border-left:3px solid var(--accent2);
  border-radius:0 8px 8px 0;padding:9px 13px;font-size:.83rem;color:var(--muted);line-height:1.5}
.variant-note{margin:0 14px 10px;background:rgba(56,189,248,.07);
  border:1px solid rgba(56,189,248,.2);border-radius:8px;padding:7px 12px;
  font-size:.78rem;color:var(--accent2)}
.nouse-note{margin:0 14px 10px;background:rgba(167,139,250,.07);
  border:1px solid rgba(167,139,250,.2);border-radius:8px;padding:7px 12px;
  font-size:.78rem;color:#a78bfa}

/* ── OPTIONS ── */
.options{padding:0 11px 12px;display:flex;flex-direction:column;gap:7px}
.opt{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;
  padding:11px 13px;text-align:left;color:var(--text);font-size:.87rem;
  font-family:inherit;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:10px}
.opt:active{transform:scale(.98)}
.opt-l{width:23px;height:23px;border-radius:50%;background:var(--bg);
  border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:600;flex-shrink:0}
.opt:hover:not(:disabled){border-color:var(--accent);background:rgba(45,212,191,.06)}
.opt.correct{border-color:var(--success);background:rgba(74,222,128,.08)}
.opt.correct .opt-l{background:var(--success);border-color:var(--success);color:#0d1117}
.opt.wrong{border-color:var(--danger);background:rgba(248,113,113,.08)}
.opt.wrong .opt-l{background:var(--danger);border-color:var(--danger);color:#0d1117}
.opt.reveal{border-color:var(--success);background:rgba(74,222,128,.04)}
.opt:disabled{cursor:default}

/* ── FEEDBACK ── */
.feedback{margin:0 11px 12px;border-radius:10px;padding:13px;
  animation:fadeIn .28s ease;display:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.feedback.show{display:block}
.feedback.ok-fb{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.3)}
.feedback.fail-fb{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.3)}
.fb-title{font-weight:700;font-size:.87rem;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.ok-fb .fb-title{color:var(--success)}.fail-fb .fb-title{color:var(--danger)}
.fb-body{font-size:.83rem;line-height:1.6;color:var(--text)}
.fb-body strong{color:var(--accent)}
.fb-tags{margin-top:7px;display:flex;flex-wrap:wrap;gap:4px}
.fb-tag{font-size:.67rem;padding:2px 8px;border-radius:100px;
  background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
/* SRS feedback line */
.srs-line{margin-top:9px;font-size:.75rem;padding:6px 10px;border-radius:8px;
  display:flex;align-items:center;gap:6px}
.srs-line.up{background:rgba(74,222,128,.08);color:var(--success)}
.srs-line.down{background:rgba(248,113,113,.08);color:var(--danger)}

.next-btn{display:none;width:calc(100% - 22px);margin:0 11px 13px;padding:12px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;
  border-radius:10px;color:#0d1117;font-weight:700;font-size:.93rem;
  font-family:inherit;cursor:pointer;transition:opacity .2s,transform .1s}
.next-btn.show{display:block}
.next-btn:active{transform:scale(.98);opacity:.9}

/* ── BROWSE (PURE FLASHCARD) MODE ── */
.browse-card{background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;margin-bottom:11px;animation:slideUp .28s ease}
.browse-body{padding:14px}
.browse-name{font-family:'DM Serif Display',serif;font-size:1.3rem;margin-bottom:3px}
.browse-cat{font-size:.7rem;color:var(--muted);margin-bottom:12px;display:flex;gap:6px;align-items:center}
.browse-section{font-size:.7rem;font-weight:600;letter-spacing:.06em;
  text-transform:uppercase;color:var(--muted);margin:10px 0 4px}
.browse-function{font-size:.85rem;line-height:1.6;color:var(--text)}
.browse-function strong{color:var(--accent)}
.browse-tip{background:var(--surface2);border-radius:8px;padding:8px 12px;
  margin-top:9px;font-size:.78rem;color:var(--muted);line-height:1.5}
.browse-nav{display:flex;gap:8px;padding:0 11px 13px}
.bnav-btn{flex:1;padding:10px;border:none;border-radius:10px;font-weight:600;
  font-size:.87rem;font-family:inherit;cursor:pointer;transition:all .2s}
.bnav-btn.prev{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.bnav-btn.next{background:var(--accent);color:#0d1117}
.bnav-btn:active{opacity:.8}
.browse-counter{text-align:center;font-size:.72rem;color:var(--muted);padding:4px 0 10px}

/* ── SUMMARY ── */
.summary{text-align:center;padding:30px 14px;animation:slideUp .3s ease}
.summary-icon{font-size:3rem;margin-bottom:11px}
.summary h2{font-family:'DM Serif Display',serif;font-size:1.7rem;margin-bottom:6px}
.summary p{color:var(--muted);margin-bottom:18px;font-size:.88rem}
.sum-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px}
.sstat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 7px}
.sstat .v{font-size:1.55rem;font-weight:700}
.sstat .l{font-size:.65rem;color:var(--muted);margin-top:2px}
.srs-summary{background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;margin-bottom:14px;text-align:left}
.srs-summary-title{font-size:.72rem;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.srs-summary-row{display:flex;justify-content:space-between;font-size:.82rem;
  padding:3px 0;border-bottom:1px solid var(--border)}
.srs-summary-row:last-child{border:none}
.v.green{color:var(--success)}.v.red{color:var(--danger)}.v.blue{color:var(--accent)}
.action-btn{width:100%;padding:12px;border:none;border-radius:10px;font-weight:700;
  font-size:.92rem;font-family:inherit;cursor:pointer;margin-bottom:7px;transition:opacity .2s}
.action-btn:active{opacity:.8}
.action-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0d1117}
.action-btn.secondary{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.action-btn.review-btn{background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.4);color:#f87171}
.action-btn.srs-btn{background:rgba(56,189,248,.12);border:1px solid rgba(56,189,248,.3);color:var(--accent2)}

/* ── STATS SCREEN ── */
.stats-screen{display:none;padding:11px 13px 110px;max-width:620px;margin:0 auto;animation:slideUp .3s ease}
.stats-screen.show{display:block}
.s-title{font-size:.66rem;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;color:var(--muted);margin:15px 0 8px}
.og{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.ms{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 6px;text-align:center}
.ms .v{font-size:1.3rem;font-weight:700}
.ms .l{font-size:.6rem;color:var(--muted);margin-top:1px}
/* SRS overview */
.srs-overview{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:4px}
.srs-ov-card{border-radius:9px;padding:11px 8px;text-align:center}
.srs-ov-card.new{background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.2)}
.srs-ov-card.learning{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2)}
.srs-ov-card.mastered{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2)}
.srs-ov-card .v{font-size:1.3rem;font-weight:700}
.srs-ov-card.new .v{color:var(--accent2)}
.srs-ov-card.learning .v{color:var(--warn)}
.srs-ov-card.mastered .v{color:var(--success)}
.srs-ov-card .l{font-size:.62rem;color:var(--muted);margin-top:1px}
/* weakness */
.weak-sec{background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.2);
  border-radius:10px;padding:12px;margin-bottom:9px}
.weak-title{font-weight:700;font-size:.83rem;color:#f87171;margin-bottom:9px}
.weak-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:.8rem}
.weak-item:last-child{margin-bottom:0}
.wbar{flex:1;height:5px;background:var(--surface2);border-radius:10px;overflow:hidden}
.wbar-fill{height:100%;border-radius:10px}
.wpct{font-size:.7rem;font-weight:700;flex:0 0 32px;text-align:right}
.strong-sec{background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.2);
  border-radius:10px;padding:12px;margin-bottom:9px}
.strong-title{font-weight:700;font-size:.83rem;color:var(--success);margin-bottom:8px}
/* cat rows */
.cat-row{display:flex;align-items:center;gap:8px;background:var(--surface);
  border:1px solid var(--border);border-radius:9px;padding:9px 12px;margin-bottom:5px}
.cat-n{font-size:.78rem;font-weight:600;flex:0 0 95px}
.cbar{flex:1;height:5px;background:var(--surface2);border-radius:10px;overflow:hidden}
.cbar-fill{height:100%;border-radius:10px;transition:width .7s ease}
.cpct{font-size:.71rem;font-weight:600;flex:0 0 32px;text-align:right}
.ccnt{font-size:.67rem;color:var(--muted);flex:0 0 44px;text-align:right}
/* diff grid */
.dg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:4px}
.ds{border-radius:9px;padding:10px 7px;text-align:center}
.ds.d1{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2)}
.ds.d2{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2)}
.ds.d3{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2)}
.ds .v{font-size:1.25rem;font-weight:700}
.ds.d1 .v{color:#4ade80}.ds.d2 .v{color:#fbbf24}.ds.d3 .v{color:#f87171}
.ds .l{font-size:.6rem;color:var(--muted);margin-top:1px}
/* history */
.hi{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--surface);
  border:1px solid var(--border);border-radius:9px;margin-bottom:5px;font-size:.78rem}
.hi-b{flex:1;min-width:0}
.hi-n{color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hi-sub{font-size:.66rem;color:var(--muted)}
.hi-r{font-size:.68rem;font-weight:700;flex:0 0 46px;text-align:right}
.hi-r.ok{color:var(--success)}.hi-r.fail{color:var(--danger)}
.clear-btn{width:100%;padding:10px;background:transparent;border:1px solid var(--border);
  border-radius:9px;color:var(--muted);font-size:.78rem;font-family:inherit;cursor:pointer;
  margin-top:11px;transition:all .2s}
.clear-btn:hover{border-color:var(--danger);color:var(--danger)}
.streak-badge{display:inline-flex;align-items:center;gap:5px;
  background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);
  border-radius:100px;padding:4px 11px;font-size:.77rem;color:var(--warn);
  font-weight:600;margin-bottom:11px}
.rev-banner{background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.2);
  border-radius:10px;padding:9px 13px;margin-bottom:9px;font-size:.82rem;
  display:flex;align-items:center;gap:8px}
.rev-banner strong{color:#f87171}

/* ── INSTALL BANNER ── */
.install-banner{position:fixed;bottom:0;left:0;right:0;z-index:500;
  background:var(--surface2);border-top:1px solid var(--border);
  padding:12px 16px;display:none;justify-content:space-between;align-items:center;gap:12px}
.install-banner.show{display:flex}
.install-banner p{font-size:.82rem;color:var(--text);flex:1}
.install-banner p span{color:var(--accent);font-weight:600}
.ib-btn{padding:7px 14px;border:none;border-radius:100px;font-weight:600;
  font-size:.78rem;font-family:inherit;cursor:pointer}
.ib-btn.install{background:var(--accent);color:#0d1117}
.ib-btn.dismiss{background:transparent;border:1px solid var(--border);color:var(--muted)}
</style>
</head>
<body>

<div class="topbar">
  <h1>⚕ InstruMed</h1>
  <div class="topbar-right">
    <div class="pill" id="scorePill">✓ <span id="sv">0</span>/<span id="tv">0</span></div>
    <button class="pill" id="statsBtn" onclick="toggleStats()">📊</button>
  </div>
</div>

<div class="filter-bar">
  <button class="fb active"     onclick="setCat('all',this)">Todos</button>
  <button class="fb"            onclick="setCat('preensao',this)">Preensão</button>
  <button class="fb"            onclick="setCat('hemostasia',this)">Hemostasia</button>
  <button class="fb"            onclick="setCat('sintese',this)">Síntese</button>

const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;};

// ════════════════════════════════════════════════════════════════
//  SRS ENGINE
//  Levels: 0=new, 1=learning(errou), 2=learning(1 acerto),
//          3=reviewing(2 acertos), 4=mastered(3+ acertos seguidos)
//  Due interval (cards until next show): [0,1,3,7,999]
// ════════════════════════════════════════════════════════════════
const SRS_INTERVALS=[0,1,3,7,999]; // cartas até próxima aparição
const SRS_LABELS={0:'new',1:'learning',2:'learning',3:'reviewing',4:'mastered'};
const SRS_DISPLAY={0:'Novo',1:'Aprendendo',2:'Aprendendo',3:'Revisão',4:'Dominado'};

function srsLevel(id){return stats.srs&&stats.srs[id]?stats.srs[id].level:0;}
function srsDue(id,qIdx){
  if(!stats.srs||!stats.srs[id])return true; // new = always due
  const s=stats.srs[id];
  return qIdx>=s.nextAt;
}
function srsUpdate(id,correct,qIdx){
  if(!stats.srs)stats.srs={};
  const cur=stats.srs[id]||{level:0,nextAt:0,streak:0};
  let lvl=cur.level;
  if(correct){
    lvl=Math.min(4,lvl+1);
  } else {
    lvl=Math.max(0,lvl-2); // drop 2 levels on wrong
  }
  const interval=SRS_INTERVALS[lvl]||1;
  stats.srs[id]={level:lvl,nextAt:qIdx+interval,streak:correct?cur.streak+1:0};
  saveStats();
  return {level:lvl,interval};
}
function srsSummary(){
  if(!stats.srs)return{new:0,learning:0,mastered:0};
  const vals=Object.values(stats.srs);
  const allIds=[...instruments,...scenarios,...nouseQuestions].map(q=>q.id);
  const newCount=allIds.filter(id=>!stats.srs[id]).length;
  const learning=vals.filter(v=>v.level>=1&&v.level<=3).length;
  const mastered=vals.filter(v=>v.level>=4).length;
  return{new:newCount,learning,mastered};
}

const KEY='instromed_v5';
let stats=loadStats();
function loadStats(){
  try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}
  return{history:[],catStats:{},diffStats:{1:{a:0,c:0},2:{a:0,c:0},3:{a:0,c:0}},
    itemStats:{},srs:{},streak:0,lastDate:null,totalAnswered:0,totalCorrect:0};
}
function saveStats(){try{localStorage.setItem(KEY,JSON.stringify(stats));}catch(e){}}

function recordAnswer(item,correct){
  const today=new Date().toDateString();
  if(stats.lastDate!==today){
    stats.streak=(stats.lastDate===new Date(Date.now()-86400000).toDateString())?stats.streak+1:1;
    stats.lastDate=today;
  }
  stats.totalAnswered++;if(correct)stats.totalCorrect++;
  const cat=item.cat;
  if(!stats.catStats[cat])stats.catStats[cat]={a:0,c:0};
  stats.catStats[cat].a++;if(correct)stats.catStats[cat].c++;
  const d=item.diff||1;
  if(!stats.diffStats)stats.diffStats={1:{a:0,c:0},2:{a:0,c:0},3:{a:0,c:0}};
  if(!stats.diffStats[d])stats.diffStats[d]={a:0,c:0};
  stats.diffStats[d].a++;if(correct)stats.diffStats[d].c++;
  if(!stats.itemStats)stats.itemStats={};
  if(!stats.itemStats[item.id])stats.itemStats[item.id]={a:0,c:0,name:item.name,cat:item.cat,diff:item.diff||1};
  stats.itemStats[item.id].a++;if(correct)stats.itemStats[item.id].c++;
  stats.history.unshift({name:item.name||'Cenário',cat:item.cat,correct,diff:item.diff||1,ts:Date.now()});
  if(stats.history.length>150)stats.history=stats.history.slice(0,150);
  saveStats();
}

let queue=[],current=null,answered=false;
let score=0,total=0,currentCat='all',currentDiff=0;
let showStats=false;
let MODE='quiz'; // 'quiz'|'review'|'diag'|'nouse'|'srs'|'browse'
let browseList=[],browseIdx=0;
let srsQueueIdx=0; // global counter for SRS due calculation

function clearModeButtons(){
  ['revBtn','diagBtn','nouseBtn','browseBtn','srsBtn'].forEach(id=>{
    document.getElementById(id).classList.remove('active');
  });
  document.querySelectorAll('.filter-bar .fb:not(.rev):not(.diag):not(.nouse):not(.browse):not([id=srsBtn])').forEach(b=>b.classList.remove('active'));
}

function setCat(cat,btn){
  MODE='quiz';currentCat=cat;clearModeButtons();
  document.querySelectorAll('.filter-bar .fb:not(.rev):not(.diag):not(.nouse):not(.browse):not([id=srsBtn])').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('diffBar').style.display='flex';
  resetBuild();
}
function setDiff(d,btn){
  currentDiff=d;
  document.querySelectorAll('.diff-bar .db').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(MODE!=='browse')resetBuild();
}
function startReview(){MODE='review';clearModeButtons();document.getElementById('revBtn').classList.add('active');document.getElementById('diffBar').style.display='none';resetBuild();}
function startDiag(){MODE='diag';clearModeButtons();document.getElementById('diagBtn').classList.add('active');document.getElementById('diffBar').style.display='none';resetBuild();}
function startNoUse(){MODE='nouse';clearModeButtons();document.getElementById('nouseBtn').classList.add('active');document.getElementById('diffBar').style.display='none';resetBuild();}
function startSRS(){MODE='srs';clearModeButtons();document.getElementById('srsBtn').classList.add('active');document.getElementById('diffBar').style.display='none';resetBuild();}
function startBrowse(){
  MODE='browse';clearModeButtons();document.getElementById('browseBtn').classList.add('active');
  document.getElementById('diffBar').style.display='none';
  if(showStats)toggleStats();
  buildBrowseList();renderBrowse();
}

function resetBuild(){
  score=0;total=0;updateScore();buildQueue();
  if(showStats)toggleStats();else renderCard();
}

function buildQueue(){
  let src;
  if(MODE==='review'){
    const ist=stats.itemStats||{};
    src=allQWithNoUse.filter(q=>{const s=ist[q.id];return(!s||s.a===0)||(s.a>0&&s.c/s.a<0.7);});
    if(!src.length)src=allQWithNoUse;
  } else if(MODE==='diag'){
    src=shuffle([...allQWithNoUse]);
  } else if(MODE==='nouse'){
    src=shuffle([...nouseQuestions]);
  } else if(MODE==='srs'){
    // Due items first, then new items
    const due=allQWithNoUse.filter(q=>srsDue(q.id,srsQueueIdx));
    src=shuffle(due.length?due:allQWithNoUse);
  } else {
    if(currentCat==='all')src=allQ;
    else if(currentCat==='cenarios')src=scenarios;
    else src=instruments.filter(i=>i.cat===currentCat);
    if(currentDiff>0)src=src.filter(i=>(i.diff||1)===currentDiff);
    if(!src.length)src=allQ;
  }
  queue=shuffle(src);
}

function buildBrowseList(){
  if(currentCat==='all')browseList=[...instruments];
  else if(currentCat==='cenarios')browseList=[...scenarios];
  else browseList=instruments.filter(i=>i.cat===currentCat);
  browseIdx=0;
}

function updateScore(){document.getElementById('sv').textContent=score;document.getElementById('tv').textContent=total;}
function updateProgress(){const d=total,t=queue.length+d;document.getElementById('progBar').style.width=(t>0?(d/t)*100:0)+'%';}
function updateSRSBadge(){
  const due=allQWithNoUse.filter(q=>srsDue(q.id,srsQueueIdx)).length;
  const badge=document.getElementById('srsBadge');
  const text=document.getElementById('srsBadgeText');
  if(due>0&&MODE!=='srs'){
    text.textContent=`${due} para revisar (SRS)`;
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
}

function getPhotos(inst){return[...(inst.localImgs||[]),...(inst.wikiImgs||[])];}
function initImg(inst,browse=false){
  const photos=getPhotos(inst);
  if(!photos.length){showPlaceholder();return;}
  const img=document.getElementById('instrImg');if(!img)return;
  const idx=Math.floor(Math.random()*photos.length);
  img._photos=photos;img._photoIdx=idx;
  img.src=photos[idx];
  if(browse){img.parentElement.classList.add('browse-mode');}
}
function onImgLoad(){
  const skel=document.getElementById('imgSkel');
  const img=document.getElementById('instrImg');
  const badge=document.getElementById('imgBadge');
  const dots=document.getElementById('photoDots');
  if(skel)skel.style.display='none';
  if(img)img.style.opacity='1';
  if(badge){
    const isLocal=img&&img._photos&&img._photos[img._photoIdx]&&img._photos[img._photoIdx].startsWith('img/');
    badge.textContent=isLocal?'📷 Foto própria':'📷 Wikimedia';
    badge.style.opacity='1';
  }
  if(dots&&img&&img._photos&&img._photos.length>1){
    dots.innerHTML=img._photos.map((_,i)=>`<span class="photo-dot${i===img._photoIdx?' active':''}"></span>`).join('');
    dots.style.display='flex';
  }
}
function onImgError(){
  const img=document.getElementById('instrImg');if(!img||!img._photos)return showPlaceholder();
  const next=img._photoIdx+1;
  if(next<img._photos.length){img._photoIdx=next;img.src=img._photos[next];}
  else showPlaceholder();
}
function cyclePhoto(){
  const img=document.getElementById('instrImg');if(!img||!img._photos||img._photos.length<2)return;
  const next=(img._photoIdx+1)%img._photos.length;
  img._photoIdx=next;img.style.opacity='0';
  const skel=document.getElementById('imgSkel');if(skel)skel.style.display='block';
  img.src=img._photos[next];
  const dots=document.getElementById('photoDots');
  if(dots)dots.querySelectorAll('.photo-dot').forEach((d,i)=>d.classList.toggle('active',i===next));
}
function showPlaceholder(){
  const wrap=document.getElementById('imgWrap');if(!wrap)return;
  const hint=current&&current.localImgs?current.localImgs[0]:'img/instrumento.jpg';
  wrap.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--muted);font-size:.77rem;text-align:center;padding:26px"><div style="font-size:2.6rem;opacity:.3">🔧</div><div>Imagem não disponível<br><span style="font-size:.63rem;color:var(--border)">Adicione: ${hint}</span></div></div>`;
}

function renderCard(){

  }
  current=queue.shift();answered=false;
  const isSc=current.cat==='cenarios'||current.noUse;
  const diff=current.diff||1;
  const num=total+1,totQ=num+queue.length;
  const L=['A','B','C','D'];
  const srsLvl=srsLevel(current.id);
  const srsLbl=SRS_LABELS[srsLvl];

  if(MODE==='diag')modeBadge=`<span class="mode-badge diag">🔍 Diagnóstico</span>`;
  if(MODE==='nouse'||current.noUse)modeBadge=`<span class="mode-badge nouse">🚫 NÃO usar</span>`;
  if(MODE==='srs')modeBadge=`<span class="srs-level ${srsLbl}">${SRS_DISPLAY[srsLvl]}</span>`;

  const imgHTML=!isSc?`
    <div class="img-wrap" id="imgWrap" onclick="cyclePhoto()">
      <div class="img-skel" id="imgSkel"></div>
      <img id="instrImg" alt="${current.name}" style="opacity:0" onload="onImgLoad()" onerror="onImgError()"/>
      <span class="img-badge" id="imgBadge"></span>
      <div class="photo-dots" id="photoDots"></div>
      ${multiPhoto?'<span class="tap-hint">👆 outra foto</span>':''}
    </div>`:`

  const variantHTML=current.variantNote?`<div class="variant-note">ℹ️ ${current.variantNote}</div>`:'';
  const nouseHTML=current.noUse?`<div class="nouse-note">🚫 Identifique qual instrumento NÃO deve ser usado nesta situação e por quê.</div>`:'';
  const ctxHTML=isSc?`<div class="q-ctx">📋 ${current.scenario}</div>`:'';

  const revBanner=MODE==='review'?`<div class="rev-banner">❌ <div><strong>Modo Revisão</strong> — itens com acurácia &lt;70%</div></div>`:'';
  const diagBanner=MODE==='diag'?`<div class="rev-banner" style="background:rgba(251,191,36,.06);border-color:rgba(251,191,36,.2)">🔍 <div><strong>Diagnóstico</strong> — um de cada instrumento</div></div>`:'';
  const nouseBanner=MODE==='nouse'?`<div class="rev-banner" style="background:rgba(167,139,250,.06);border-color:rgba(167,139,250,.2)">🚫 <div><strong>Modo "Qual NÃO usar"</strong> — identifique contraindicações</div></div>`:'';

  area.innerHTML=`

    <div class="card">
      <div class="card-header">
        <div class="card-meta">
          <span class="card-tag">${isSc?(current.noUse?'🚫 Contraindicação':'🏥 Cenário'):'🔬 Identificação'}</span>
          <span class="diff-badge ${DC[diff]}">${DL[diff]}</span>

// ════════════════════════════════════════════════════════════════
//  ANSWER
// ════════════════════════════════════════════════════════════════
function answer(idx){
  if(answered)return;answered=true;total++;
  const ok=idx===current.correct;
  if(ok)score++;
  updateScore();recordAnswer(current,ok);
  // SRS update
  let srsResult=null;
  if(MODE==='srs'){srsQueueIdx++;srsResult=srsUpdate(current.id,ok,srsQueueIdx);}
  document.querySelectorAll('.opt').forEach((b,i)=>{
    b.disabled=true;
    if(i===current.correct)b.classList.add(ok&&i===idx?'correct':'reveal');
    if(i===idx&&!ok)b.classList.add('wrong');
  });
  if(ok)document.getElementById('opt'+idx).classList.add('correct');
  const fb=document.getElementById('feedback');
  fb.classList.add('show',ok?'ok-fb':'fail-fb');
  const name=current.name||current.options[current.correct];
  let srsLine='';
  if(srsResult){
    const lvlName=SRS_DISPLAY[srsResult.level];
    if(ok)srsLine=`<div class="srs-line up">⬆️ Nível SRS: ${lvlName} — próxima revisão em ${srsResult.interval} questão${srsResult.interval!==1?'s':''}</div>`;
    else srsLine=`<div class="srs-line down">⬇️ Nível SRS: ${lvlName} — voltará em breve</div>`;
  }
  fb.innerHTML=ok
    ?`<div class="fb-title">✓ Correto!</div><div class="fb-body"><strong>${name}</strong><br><br>${current.function}<br><br><em style="color:var(--muted)">💡 ${current.tip}</em></div><div class="fb-tags">${current.tags.map(t=>`<span class="fb-tag">${t}</span>`).join('')}${srsLine}</div>`
    :`<div class="fb-title">✗ Incorreto</div><div class="fb-body">Certo: <strong>${current.options[current.correct]}</strong><br><br>${current.function}<br><br><em style="color:var(--muted)">💡 ${current.tip}</em></div><div class="fb-tags">${current.tags.map(t=>`<span class="fb-tag">${t}</span>`).join('')}${srsLine}</div>`;
  document.getElementById('nextBtn').classList.add('show');
  updateProgress();updateSRSBadge();
}

      <div class="browse-body">
        <div class="browse-name">${inst.name}</div>
        <div class="browse-cat">
          <span>${catLabels[inst.cat]||inst.cat}</span>
          ${inst.variantNote?`<span style="color:var(--accent2)">${inst.variantNote}</span>`:''}
        </div>
        <div class="browse-section">Função</div>
        <div class="browse-function">${inst.function}</div>
        <div class="browse-tip">💡 ${inst.tip}</div>
        <div class="browse-section" style="margin-top:10px">Tags</div>
        <div class="fb-tags">${inst.tags.map(t=>`<span class="fb-tag">${t}</span>`).join('')}</div>
      </div>
    </div>
    <div class="browse-nav">
      <button class="bnav-btn prev" onclick="browsePrev()" ${browseIdx===0?'disabled style="opacity:.4"':''}>← Anterior</button>
      <button class="bnav-btn next" onclick="browseNext()" ${browseIdx===browseList.length-1?'disabled style="opacity:.4;background:var(--muted)"':''}>Próximo →</button>
    </div>`;

  current=inst; // for cyclePhoto/placeholder to work
  initImg(inst,true);
}

function browseNext(){if(browseIdx<browseList.length-1){browseIdx++;renderBrowse();}}
function browsePrev(){if(browseIdx>0){browseIdx--;renderBrowse();}}

// ════════════════════════════════════════════════════════════════
//  SUMMARY
// ════════════════════════════════════════════════════════════════
function renderSummary(){
  const pct=total>0?Math.round(score/total*100):0;
  const e=pct>=80?'🏆':pct>=60?'📈':'📚';
  const m=pct>=80?'Excelente!':pct>=60?'Bom progresso!':'Continue estudando!';
  const ist=stats.itemStats||{};
  const revCount=allQWithNoUse.filter(q=>{const s=ist[q.id];return(!s||s.a===0)||(s.a>0&&s.c/s.a<0.7);}).length;
  const srsS=srsSummary();

  const srsBlock=MODE==='srs'?`
    <div class="srs-summary">
      <div class="srs-summary-title">Progresso SRS desta sessão</div>
      <div class="srs-summary-row"><span>Novos</span><span style="color:var(--accent2)">${srsS.new}</span></div>
      <div class="srs-summary-row"><span>Aprendendo</span><span style="color:var(--warn)">${srsS.learning}</span></div>
      <div class="srs-summary-row"><span>Dominados</span><span style="color:var(--success)">${srsS.mastered}</span></div>
    </div>`:
    ``;

  document.getElementById('cardArea').innerHTML=`
    <div class="summary">
      <div class="summary-icon">${e}</div><h2>${m}</h2>
      <p>${total} questão${total>1?'s':''} respondida${total>1?'s':''}.</p>
      <div class="sum-stats">
        <div class="sstat"><div class="v green">${score}</div><div class="l">Acertos</div></div>
        <div class="sstat"><div class="v red">${total-score}</div><div class="l">Erros</div></div>
        <div class="sstat"><div class="v blue">${pct}%</div><div class="l">Acurácia</div></div>
      </div>
      ${srsBlock}
      <button class="action-btn primary" onclick="score=0;total=0;updateScore();buildQueue();renderCard()">↺ Refazer</button>
      ${revCount>0?`<button class="action-btn review-btn" onclick="startReview()">❌ Revisar ${revCount} itens fracos</button>`:''}
      <button class="action-btn srs-btn" onclick="startSRS()">🧠 Iniciar SRS</button>
      <button class="action-btn secondary" onclick="toggleStats()">📊 Ver Estatísticas</button>
    </div>`;
}

// ════════════════════════════════════════════════════════════════
//  STATS SCREEN
// ════════════════════════════════════════════════════════════════
function toggleStats(){
  showStats=!showStats;
  document.getElementById('quizMain').style.display=showStats?'none':'block';
  document.getElementById('statsScreen').classList.toggle('show',showStats);
  document.getElementById('statsBtn').classList.toggle('active-solid',showStats);
  if(showStats)renderStats();
}

function renderStats(){
  const s=stats;
  const gl=s.totalAnswered||0,gc=s.totalCorrect||0;
  const gpct=gl>0?Math.round(gc/gl*100):0;
  const srsS=srsSummary();
  const ist=s.itemStats||{};
  const weak=Object.values(ist).filter(x=>x.a>=2).map(x=>({...x,pct:Math.round(x.c/x.a*100)})).sort((a,b)=>a.pct-b.pct).slice(0,5);
  const strong=Object.values(ist).filter(x=>x.a>=3&&x.c===x.a).sort((a,b)=>b.a-a.a).slice(0,4);
  const streakHTML=s.streak>1?`<div class="streak-badge">🔥 ${s.streak} dia${s.streak>1?'s':''} seguido${s.streak>1?'s':''}</div>`:'';
  const catHTML=Object.keys(catLabels).map(cat=>{
    const cs=s.catStats[cat]||{a:0,c:0};
    const pct=cs.a>0?Math.round(cs.c/cs.a*100):0;
    const col=pct>=80?'var(--success)':pct>=60?'var(--warn)':'var(--danger)';
    return `<div class="cat-row"><span class="cat-n">${catLabels[cat]}</span><div class="cbar"><div class="cbar-fill" style="width:${cs.a>0?pct:0}%;background:${col}"></div></div><span class="cpct" style="color:${col}">${cs.a>0?pct+'%':'—'}</span><span class="ccnt">${cs.c}/${cs.a}</span></div>`;
  }).join('');
  const ds=s.diffStats||{1:{a:0,c:0},2:{a:0,c:0},3:{a:0,c:0}};
  const diffHTML=`<div class="dg">${[1,2,3].map(d=>{const dd=ds[d]||{a:0,c:0};const p=dd.a>0?Math.round(dd.c/dd.a*100):0;return`<div class="ds d${d}"><div class="v">${dd.a>0?p+'%':'—'}</div><div class="l">${DL[d]}<br>${dd.c}/${dd.a}</div></div>`}).join('')}</div>`;
  const weakHTML=weak.length?`<div class="weak-sec"><div class="weak-title">⚠️ Pontos Fracos</div>${weak.map(w=>`<div class="weak-item"><span style="flex:1;font-size:.78rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${w.name}</span><div class="wbar"><div class="wbar-fill" style="width:${w.pct}%;background:${w.pct<40?'var(--danger)':'var(--warn)'}"></div></div><span class="wpct" style="color:${w.pct<40?'var(--danger)':'var(--warn)'}">${w.pct}%</span></div>`).join('')}<button style="width:100%;margin-top:9px;padding:8px;background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);border-radius:8px;color:#f87171;font-size:.78rem;font-family:inherit;cursor:pointer;font-weight:600" onclick="startReview();toggleStats()">❌ Revisar agora</button></div>`:'' ;
  const strongHTML=strong.length?`<div class="strong-sec"><div class="strong-title">✅ Dominados</div>${strong.map(w=>`<div style="font-size:.76rem;color:var(--muted);padding:2px 0">${w.name} <span style="color:var(--success);font-weight:600">(${w.a}×)</span></div>`).join('')}</div>`:'';
  const hist=s.history.slice(0,40);
  const histHTML=hist.length?hist.map(h=>`<div class="hi"><span>${h.correct?'✅':'❌'}</span><div class="hi-b"><div class="hi-n">${h.name}</div><div class="hi-sub">${catLabels[h.cat]||h.cat} · ${DL[h.diff||1]}</div></div><span class="hi-r ${h.correct?'ok':'fail'}">${h.correct?'Acerto':'Erro'}</span></div>`).join(''):'<p style="color:var(--muted);font-size:.8rem">Nenhuma resposta registrada.</p>';

  document.getElementById('statsContent').innerHTML=`
    ${streakHTML}
    <div class="s-title">Desempenho Geral</div>
    <div class="og">
      <div class="ms"><div class="v blue">${gl}</div><div class="l">Total</div></div>
      <div class="ms"><div class="v green">${gc}</div><div class="l">Acertos</div></div>
      <div class="ms"><div class="v red">${gl-gc}</div><div class="l">Erros</div></div>
      <div class="ms"><div class="v ${gpct>=70?'green':'red'}">${gpct}%</div><div class="l">Acurácia</div></div>
    </div>
    <div class="s-title">SRS — Repetição Espaçada</div>
    <div class="srs-overview">
      <div class="srs-ov-card new"><div class="v">${srsS.new}</div><div class="l">Novos</div></div>
      <div class="srs-ov-card learning"><div class="v">${srsS.learning}</div><div class="l">Aprendendo</div></div>
      <div class="srs-ov-card mastered"><div class="v">${srsS.mastered}</div><div class="l">Dominados</div></div>
    </div>
    <div class="s-title">Por Dificuldade</div>
    ${diffHTML}
    ${weakHTML}${strongHTML}
    <div class="s-title">Por Categoria</div>
    ${catHTML}
    <div class="s-title">Histórico Recente</div>
    ${histHTML}
    <button class="clear-btn" onclick="clearStats()">🗑 Limpar histórico</button>`;
}

function clearStats(){
  if(!confirm('Limpar todo o histórico e progresso SRS?'))return;
  stats={history:[],catStats:{},diffStats:{1:{a:0,c:0},2:{a:0,c:0},3:{a:0,c:0}},itemStats:{},srs:{},streak:0,lastDate:null,totalAnswered:0,totalCorrect:0};
  saveStats();renderStats();
}

// ════ INIT ════
buildQueue();renderCard();updateSRSBadge();
</script>
</body>
</html>
