<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debug - Foto Bug</title>
<style>
body{font-family:sans-serif;background:#0d1117;color:#e6edf3;padding:20px;max-width:500px;margin:0 auto}
.box{background:#161b22;border:1px solid #30363d;border-radius:12px;overflow:hidden;margin-bottom:16px}
.img-area{min-height:180px;background:#080d12;display:flex;align-items:center;justify-content:center;position:relative}
.img-area img{max-height:180px;max-width:100%;object-fit:contain}
#placeholder{display:none;flex-direction:column;align-items:center;gap:8px;color:#8b949e;font-size:.85rem;text-align:center;padding:20px}
.log{background:#0a0f16;border:1px solid #30363d;border-radius:8px;padding:12px;font-size:.75rem;font-family:monospace;max-height:300px;overflow-y:auto}
.log div{padding:2px 0;border-bottom:1px solid #1c2330}
.log .ok{color:#4ade80}.log .err{color:#f87171}.log .info{color:#38bdf8}.log .warn{color:#fbbf24}
button{background:#2dd4bf;border:none;border-radius:8px;padding:10px 20px;color:#0d1117;font-weight:700;cursor:pointer;margin:4px;font-size:.9rem}
button.sec{background:#1c2330;border:1px solid #30363d;color:#e6edf3}
</style>
</head>
<body>
<h2 style="color:#2dd4bf">🔍 Debug - Sistema de Fotos</h2>
<p style="color:#8b949e;font-size:.85rem;margin-bottom:16px">Esta página testa o sistema de fotos isoladamente. Abra no celular e me manda print do log.</p>

<div class="box">
  <div class="img-area" id="imgArea">
    <img id="testImg" style="opacity:0" onload="onLoad()" onerror="onError()"/>
    <div id="placeholder">
      <div style="font-size:2rem">🔧</div>
      <div>Placeholder ativo</div>
      <div style="font-size:.7rem;color:#30363d" id="phHint"></div>
    </div>
  </div>
  <div style="padding:12px;display:flex;gap:8px;flex-wrap:wrap">
    <button onclick="cyclePhoto()">👆 Outra foto</button>
    <button class="sec" onclick="resetTest()">↺ Reset</button>
    <button class="sec" onclick="clearLog()">🗑 Limpar log</button>
  </div>
  <div style="padding:0 12px 12px;font-size:.78rem;color:#8b949e">
    Foto real atual: <span id="realIdxSpan" style="color:#fbbf24">0</span> /
    Total reais: <span id="totalRealSpan" style="color:#38bdf8">-</span> |
    Tentativa: <span id="attemptSpan" style="color:#a78bfa">0</span>
  </div>
</div>

<div class="log" id="log"></div>

<div style="margin-top:16px">
  <p style="font-size:.8rem;color:#8b949e;margin-bottom:8px">Teste manual — cole o nome do arquivo:</p>
  <input id="customFile" style="background:#1c2330;border:1px solid #30363d;border-radius:6px;padding:8px;color:#e6edf3;width:100%;margin-bottom:8px;font-size:.85rem" placeholder="ex: adson_1.jpg" value="adson_1.jpg"/>
  <button onclick="testFile(document.getElementById('customFile').value)">Testar este arquivo</button>
</div>

<script>
// ── Simula exatamente o que o app faz ──

// Instrumento de teste (Adson — 1 foto local, 1 wiki)
const testInst = {
  name: 'Pinça de Adson',
  localImgs: ['img/adson_1.jpg'],
  wikiImgs: ['https://commons.wikimedia.org/w/thumb.php?f=Adson_tissue_forceps.jpg&width=700']
};

let state = {
  real: [],       // fotos reais
  photos: [],     // tentativas atuais (variantes)
  photoIdx: 0,    // índice dentro de photos
  realIdx: 0,     // índice dentro de real
  failed: [],     // índices de photos que falharam
};

function log(msg, cls='info'){
  const el=document.getElementById('log');
  const d=document.createElement('div');
  d.className=cls;
  d.textContent=new Date().toLocaleTimeString('pt-BR',{hour12:false})+' '+msg;
  el.insertBefore(d,el.firstChild);
}
function clearLog(){document.getElementById('log').innerHTML='';}

function localVariants(path){
  if(!path.startsWith('img/'))return[path];
  const f=path.slice(4);
  const cap=f.charAt(0).toUpperCase()+f.slice(1);
  return [...new Set([path,'img/'+cap,path.replace(/\.jpg$/i,'.JPG'),path.replace(/\.jpg$/i,'.png'),path.replace(/\.jpg$/i,'.PNG')])];
}

function getRealPhotos(inst){
  return [...(inst.localImgs||[]),...(inst.wikiImgs||[])];
}

function updateUI(){
  document.getElementById('realIdxSpan').textContent=state.realIdx;
  document.getElementById('totalRealSpan').textContent=state.real.length;
  document.getElementById('attemptSpan').textContent=state.photoIdx;
}

function showPlaceholder(hint){
  const img=document.getElementById('testImg');
  img.style.display='none';
  img.style.opacity='0';
  document.getElementById('placeholder').style.display='flex';
  document.getElementById('phHint').textContent=hint||'';
  log('🔧 Placeholder ativado — '+hint,'warn');
}

function hidePlaceholder(){
  document.getElementById('placeholder').style.display='none';
  const img=document.getElementById('testImg');
  img.style.display='block';
}

function loadPhoto(src){
  const img=document.getElementById('testImg');
  hidePlaceholder();
  img.style.opacity='0';
  log('⏳ Tentando carregar: '+src,'info');
  img.src=src;
  updateUI();
}

function initTest(){
  state.real=getRealPhotos(testInst);
  state.realIdx=0;
  state.failed=[];
  state.photoIdx=0;
  state.photos=localVariants(testInst.localImgs[0]);
  // adiciona wikis como fallback
  (testInst.wikiImgs||[]).forEach(w=>state.photos.push(w));
  log('▶ Init: '+state.real.length+' fotos reais, '+state.photos.length+' tentativas','info');
  log('  Reais: '+state.real.join(' | '),'info');
  log('  Tentativas: '+state.photos.join(' | '),'info');
  loadPhoto(state.photos[0]);
}

function onLoad(){
  const img=document.getElementById('testImg');
  img.style.opacity='1';
  log('✅ Carregou OK: '+img.src,'ok');
  updateUI();
}

function onError(){
  const img=document.getElementById('testImg');
  log('❌ Falhou: '+img.src,'err');
  state.failed.push(state.photoIdx);
  // Próxima tentativa
  let next=state.photoIdx+1;
  while(next<state.photos.length&&state.failed.includes(next))next++;
  if(next<state.photos.length){
    state.photoIdx=next;
    loadPhoto(state.photos[next]);
  } else {
    showPlaceholder(state.real[state.realIdx]||'?');
  }
  updateUI();
}

function cyclePhoto(){
  log('👆 cyclePhoto chamado. realIdx='+state.realIdx+' real.length='+state.real.length,'info');

  if(state.real.length===0){log('⚠ Nenhuma foto real','warn');return;}

  // Avança para a próxima foto real
  const next=(state.realIdx+1)%state.real.length;
  state.realIdx=next;
  state.failed=[];
  state.photoIdx=0;

  // Monta lista de tentativas para esta foto
  const isWiki=next>=(testInst.localImgs||[]).length;
  if(isWiki){
    state.photos=[state.real[next]];
  } else {
    state.photos=localVariants(state.real[next]);
    const wiki=(testInst.wikiImgs||[])[0];
    if(wiki&&!state.photos.includes(wiki))state.photos.push(wiki);
  }

  log('→ Nova foto real ['+next+']: '+state.real[next],'info');
  log('→ Tentativas: '+state.photos.join(' | '),'info');
  loadPhoto(state.photos[0]);
}

function resetTest(){
  log('↺ Reset','warn');
  state={real:[],photos:[],photoIdx:0,realIdx:0,failed:[]};
  initTest();
}

function testFile(filename){
  const path=filename.startsWith('img/')?filename:'img/'+filename;
  log('🧪 Teste manual: '+path,'warn');
  const img=document.getElementById('testImg');
  hidePlaceholder();
  img.style.opacity='0';
  img.src=path;
}

// Inicia
initTest();
</script>
</body>
</html>
